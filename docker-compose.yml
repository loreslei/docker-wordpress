version: '3.8'

# Declarando os volumes nativos para máxima velocidade no Docker
volumes:
  db_data:
  wp_data:

services:
  db:
    image: mysql:5.7
    container_name: mysql_db
    restart: always
    # command: --max_connections=1000
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: wordpress_db
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      # Senha adicionada para limpar o log de erros
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 5s
      timeout: 3s
      retries: 10

  wordpress1:
    image: wordpress:5.4.2-php7.2-apache
    container_name: wordpress1
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
      WORDPRESS_DB_NAME: wordpress_db
    volumes:
      - wp_data:/var/www/html

  wordpress2:
    image: wordpress:5.4.2-php7.2-apache
    container_name: wordpress2
    restart: on-failure
    depends_on:
      - db
      - wordpress1 # Fila indiana restaurada
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
      WORDPRESS_DB_NAME: wordpress_db
    volumes:
      - wp_data:/var/www/html

  wordpress3:
    image: wordpress:5.4.2-php7.2-apache
    container_name: wordpress3
    restart: on-failure
    depends_on:
      - db
      - wordpress2 # Fila indiana restaurada
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
      WORDPRESS_DB_NAME: wordpress_db
    volumes:
      - wp_data:/var/www/html
      
  nginx:
    image: nginx:1.19.0
    container_name: nginx_balancer
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - wp_data:/usr/share/nginx/html
    depends_on:
      - wordpress1
      - wordpress2
      - wordpress3

  locust:
    image: locustio/locust
    container_name: locust_gerador
    ports:
      - "8089:8089"
    volumes:
      - ./locust-scripts:/mnt/locust
    extra_hosts:
      - "localhost:host-gateway"
    command: -f /mnt/locust/locustfile.py --host http://localhost:8080 --headless -u 160 -r 4 --run-time 2m --csv=/mnt/locust/resultado_leve/resultado_users
    # command: -f /mnt/locust/locustfile.py --host http://localhost:8080 --headless -u 800 -r 20 --run-time 2m --csv=/mnt/locust/resultado_medio/resultado_users
    # command: -f /mnt/locust/locustfile.py --host http://localhost:8080 --headless -u 2000 -r 100 --run-time 2m --csv=/mnt/locust/resultado_pesado/resultado_users
    depends_on:
      - nginx